# ============================================================
# German Moonshine — Phase 2: Resume training from 10k checkpoint
# Target: WER < 25% (currently 36.7%)
# ============================================================
# USAGE:
#   CUDA_VISIBLE_DEVICES=0 uv run python train.py \
#       --config configs/german_resume_v2.yaml \
#       --resume /data/results-moonshine-de/final
#
# HOW --resume WORKS:
#   - Loads model WEIGHTS from checkpoint (German knowledge preserved)
#   - Optimizer state is NOT restored (starts fresh)
#   - Step counter starts at 0 (max_steps = NEW steps, not total)
#   - Encoded dataset is re-saved (symlink avoids disk duplication)
#
# RATIONALE:
#   v1: 10k steps, LR 3e-4, loss 1.61, WER 36.7% — loss still dropping
#   Pierre: 8k steps with 60k samples (~8.5 epochs) → 21.8% WER
#   We did: 10k steps with 470k samples (~1.36 epochs) — clearly undercooked
#   This run: 20k more steps (~2.7 more epochs, ~4.1 total)
#
#   LR 3e-4 (same as v1): schedule-free AdamW adapts automatically.
#   The model weights encode learned knowledge; optimizer restarts clean.
#   Pierre proved 3e-4 works for moonshine-tiny fine-tuning.
#   Dropping to 1e-4 would learn 3x slower — wasteful.
#
# EXPECTED:
#   Time: ~20k steps × 3.5s/step ≈ ~19 hours
#   WER target: ~28-32% (meaningful improvement; <25% may need curriculum)

model:
  name: "UsefulSensors/moonshine-tiny"
  freeze_encoder: false

dataset:
  type: "local"
  path: "/storage/datasets/german_combined"
  text_column: "sentence"

audio:
  sampling_rate: 16000
  max_duration: 20.0
  min_duration: 4.0

preprocessing:
  num_proc: 8
  normalize_audio: true
  target_rms: 0.075

curriculum:
  enabled: false

training:
  output_dir: "/data/results-moonshine-de-v2"

  # ---- Batch (identical to v1 — proven) ----
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4      # effective batch = 64
  gradient_checkpointing: false       # broken with Moonshine in transformers 4.49
  bf16: true
  fp16: false
  bf16_full_eval: true
  fp16_full_eval: false
  group_by_length: true
  length_column_name: "input_length"
  max_grad_norm: 1.0

  # ---- Training length ----
  # 20k NEW steps (step counter resets to 0 with --resume)
  # 470k samples / 64 batch = ~7,350 steps per epoch
  # 20k steps = ~2.7 epochs → total ~4.1 epochs (including v1's 1.36)
  max_steps: 20000

  # ---- Optimizer ----
  # KEEP 3e-4 (same as v1 — proven, loss was still dropping)
  # Schedule-free AdamW adapts; model weights carry the knowledge
  # Lower LR only wastes GPU hours
  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  warmup_steps: 300                   # Same as v1 — optimizer starts fresh anyway

  # ---- Evaluation & saving ----
  eval_strategy: "steps"
  eval_steps: 500                     # Frequent — watch the WER curve
  save_steps: 2000                    # Every ~2h, save checkpoint
  logging_steps: 50
  predict_with_generate: true

  # ---- Best model selection ----
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false

  # ---- Logging ----
  report_to: ["tensorboard"]
  logging_dir: "/data/logs/moonshine-de-v2"

  # ---- Hub ----
  push_to_hub: false
  hub_model_id: null
  hub_strategy: "every_save"
  hub_token: null

generation:
  max_new_tokens: 80
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
