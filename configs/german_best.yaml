# ============================================================
# German Moonshine — Best single-run config (no resume needed)
# Target: WER < 25%
# ============================================================
#
# USAGE:
#   CUDA_VISIBLE_DEVICES=0 uv run python train.py \
#       --config configs/german_best.yaml
#
# MATH:
#   Dataset: 469,942 train samples (MLS German, 4-20s, ~1,967 hours)
#   Effective batch: 16 × 4 = 64
#   Steps per epoch: 469,942 / 64 ≈ 7,343
#
#   Pierre's French reference:
#     60k samples, batch 64, 8k steps = ~8.5 epochs → 21.8% WER
#
#   Our target: match Pierre's epoch coverage on larger dataset
#     7,343 steps/epoch × 6 epochs = ~44,000 steps
#     (Slightly fewer epochs than Pierre since more data = more diversity per epoch)
#
# ESTIMATED TIME:
#   ~44k steps × 3.5s/step ≈ ~43 hours on RTX 5090
#   (~2 days, or split across overnight runs with --resume)
#
# IF SHORT ON TIME:
#   Use --max-steps 30000 (~4 epochs, ~29h) for a good-but-not-best result
#
# GOTCHAS:
#   - gradient_checkpointing MUST be false (broken with Moonshine)
#   - MUST use CUDA_VISIBLE_DEVICES=0 (dual GPU breaks Moonshine)
#   - datasets MUST be < 4.0 (4.x breaks audio decoding)
#   - transformers MUST be < 4.50 (removes training params)

model:
  name: "UsefulSensors/moonshine-tiny"
  freeze_encoder: false    # Train full model — new language needs encoder adaptation

dataset:
  type: "local"
  path: "/storage/datasets/german_combined"
  text_column: "sentence"

audio:
  sampling_rate: 16000
  max_duration: 20.0       # Moonshine paper: [4, 30]s — MLS already filtered to [4, 20]s
  min_duration: 4.0

preprocessing:
  num_proc: 8              # ziggie: 48 cores, 125 GB RAM — 8 workers is sweet spot
  normalize_audio: true
  target_rms: 0.075

curriculum:
  enabled: false           # No curriculum — MLS is already clean, uniform data

training:
  output_dir: "/data/results-moonshine-de"

  # ---- Batch ----
  # RTX 5090 (32 GB): batch 16 fits comfortably with 27M model
  # Effective batch 64 matches Pierre's proven setup
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4      # 16 × 4 = 64 effective
  gradient_checkpointing: false       # BROKEN with Moonshine (bool vs dict is_updated error)
  bf16: true                          # RTX 5090 native — better precision than fp16
  fp16: false
  bf16_full_eval: true
  fp16_full_eval: false
  group_by_length: true               # Efficient batching — less padding waste
  length_column_name: "input_length"
  max_grad_norm: 1.0

  # ---- Training length ----
  # 44,000 steps ≈ 6 epochs — generous but not wasteful
  # Pierre got 21.8% at ~8.5 epochs on 60k samples
  # We have 8x more data, so fewer epochs should suffice
  max_steps: 44000

  # ---- Optimizer ----
  # Schedule-free AdamW: same as Moonshine paper and Pierre's French model
  # LR 3e-4: Pierre's exact value, scaled from paper's 1.4e-3 for batch 64
  # No LR scheduler needed — schedule-free adapts automatically
  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  warmup_steps: 300                   # ~3.2% of first epoch — matches paper ratio

  # ---- Evaluation & saving ----
  eval_strategy: "steps"
  eval_steps: 2000                    # Every ~2000 steps ≈ every ~2 hours
  save_steps: 2000                    # Checkpoints align with evals
  logging_steps: 50                   # TensorBoard updates every 50 steps
  predict_with_generate: true         # Compute WER during eval (slower but essential)

  # ---- Best model selection ----
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false

  # ---- Logging ----
  report_to: ["tensorboard"]
  logging_dir: "/data/logs/moonshine-de"

  # ---- Hub ----
  push_to_hub: false
  hub_model_id: null
  hub_strategy: "every_save"
  hub_token: null

generation:
  max_new_tokens: 80                  # German compound words need more tokens than French
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
