# ============================================================
# German Moonshine Base — 60k subset sanity test
# Target: Break through the 35% WER ceiling from tiny
# ============================================================
#
# USAGE:
#   CUDA_VISIBLE_DEVICES=0 uv run python train.py \
#       --config configs/german_base_60k.yaml
#
# PREREQ:
#   The 60k subset must exist at /storage/datasets/german_60k/
#   If it doesn't, recreate it — see contexts/STATUS.md for full steps.
#
# MATH:
#   Dataset: 60,000 train samples (subset of MLS German)
#   Effective batch: 16 × 4 = 64
#   Steps per epoch: 60,000 / 64 ≈ 937
#   8,000 steps ≈ 8.5 epochs (matches Pierre's French reference)
#
# ESTIMATED TIME:
#   ~8k steps × 5-6s/step ≈ 11-13 hours on RTX 5090
#
# STORAGE:
#   - Source dataset: /storage/datasets/german_60k/ (~140 GB)
#   - .map() temp cache: written next to source (~80 GB, on /storage)
#   - Encoded cache: /data/results-moonshine-de-base-60k_encoded/ (~50-80 GB)
#   - Checkpoints: /data/results-moonshine-de-base-60k/ (~500 MB each)
#   Total: ~220 GB /storage + ~80 GB /data — fits comfortably.
#
# IF OOM:
#   Reduce to batch 12 + grad_accum 6 (effective 72)
#
# GOTCHAS (same as tiny — same architecture class):
#   - gradient_checkpointing MUST be false
#   - MUST use CUDA_VISIBLE_DEVICES=0
#   - datasets MUST be < 4.0
#   - transformers MUST be < 4.50

model:
  name: "UsefulSensors/moonshine-base"
  freeze_encoder: false

dataset:
  type: "local"
  path: "/storage/datasets/german_60k"
  text_column: "sentence"

audio:
  sampling_rate: 16000
  max_duration: 20.0
  min_duration: 4.0

preprocessing:
  num_proc: 8
  normalize_audio: true
  target_rms: 0.075

curriculum:
  enabled: false

training:
  output_dir: "/data/results-moonshine-de-base-60k"
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  gradient_checkpointing: false
  bf16: true
  fp16: false
  bf16_full_eval: true
  fp16_full_eval: false
  group_by_length: true
  length_column_name: "input_length"
  max_grad_norm: 1.0
  max_steps: 8000
  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  warmup_steps: 200
  eval_strategy: "steps"
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  predict_with_generate: true
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  report_to: ["tensorboard"]
  logging_dir: "/data/logs/moonshine-de-base-60k"
  push_to_hub: false
  hub_model_id: null

generation:
  max_new_tokens: 100
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
